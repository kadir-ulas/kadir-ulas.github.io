<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kadir'in Web Sitesi</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="content"></div>
  <script>
    // JSON verilerini çek ve göster
    fetch('data.json')
      .then(response => response.json())
      .then(data => {
        const content = document.getElementById('content');
        content.innerHTML = `
          <h1>${data.name}</h1>
          <h2>${data.title}</h2>
          <p>${data.bio}</p>
          <ul>
            ${data.links.map(link => `<li><a href="${link.url}">${link.name}</a></li>`).join('')}
          </ul>
        `;
      });
  </script>
</body>
</html>
